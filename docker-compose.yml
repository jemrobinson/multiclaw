services:
  saferclaw-vllm-server:
    image: "nvcr.io/nvidia/vllm:${VLLM_VERSION:-26.05.post1-py3}"
    container_name: saferclaw-vllm-server
    ipc: host
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_CACHE: /root/.cache/huggingface
    volumes:
      - "${HF_HUB_CACHE:-${HOME:-/tmp}/.cache/huggingface}:/root/.cache/huggingface"
    ports:
      - "${VLLM_PORT:-8020}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      python3 -m vllm.entrypoints.openai.api_server
      --model ${HF_MODEL_REPO:-openai}/${HF_MODEL_NAME:-gpt-oss-20b}
      --enable-auto-tool-choice
      --gpu-memory-utilization 0.3
      --host 0.0.0.0
      --port 8000
      --tool-call-parser hermes
    restart: unless-stopped
