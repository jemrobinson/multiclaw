services:
  multiclaw-vllm-server:
    image: "nvcr.io/nvidia/vllm:${VLLM_VERSION:-26.05.post1-py3}"
    container_name: multiclaw-vllm-server
    ipc: host
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_CACHE: /root/.cache/huggingface
    volumes:
      - "${HF_HUB_CACHE:-${HOME:-/tmp}/.cache/huggingface}:/root/.cache/huggingface"
    ports:
      - "${VLLM_PORT:-8020}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command:
      [
        "vllm",
        "serve",
        "${HF_MODEL_REPO:-openai}/${HF_MODEL_NAME:-gpt-oss-20b}",
        "--gpu-memory-utilization=${MAX_GPU_MEM_PERCENT:-0.6}",
      ]
    restart: unless-stopped

  multiclaw-openshell-gateway:
    image: ghcr.io/nvidia/openshell/gateway:latest
    container_name: multiclaw-openshell-gateway
    restart: unless-stopped

    # Clear the default CMD so gateway.toml owns all settings (see note above).
    command: []

    # Run as UID 0 so the gateway can:
    #   - write the extracted supervisor binary to /var/lib/openshell
    #   - access /var/run/docker.sock (typically owned by root or the docker group)
    user: "0"

    ports:
      # gRPC / control-plane API  (used by the openshell CLI and sandbox callbacks)
      - "127.0.0.1:${OPENSHELL_PORT:-8080}:8080"
      # Health endpoint  (GET /healthz, GET /readyz)
      - "127.0.0.1:${OPENSHELL_HEALTH_PORT:-8081}:8081"

    # See https://docs.nvidia.com/openshell/about/container-gateway#quick-start
    volumes:
      # Use the host Docker socket to create sibling containers on the host (Docker-outside-of-Docker)
      - /var/run/docker.sock:/var/run/docker.sock

      # Data directory — must be a bind-mount with source == target so that
      # internal and external Docker use the same paths
      - type: bind
        source: ${OPENSHELL_INSTALL_PATH:-/tmp/openshell}/supervisor/openshell-sandbox
        target: ${OPENSHELL_INSTALL_PATH:-/tmp/openshell}/supervisor/openshell-sandbox
        bind:
          create_host_path: true

      # TOML config — all gateway and driver settings live here.
      # Docker Compose resolves ./ relative to the directory that contains this
      # docker-compose.yml file (deploy/docker/), not the CWD of the caller.
      - type: bind
        source: ${OPENSHELL_INSTALL_PATH:-/tmp/openshell}/config/gateway.toml
        target: /etc/openshell/gateway.toml
        read_only: true

    environment:
      OPENSHELL_GATEWAY_CONFIG: /etc/openshell/gateway.toml
      OPENSHELL_DB_URL: "sqlite:${OPENSHELL_INSTALL_PATH:-/tmp/openshell}/config/gateway.db?mode=rwc"
      XDG_DATA_HOME: ${OPENSHELL_INSTALL_PATH:-/tmp/openshell}
      HOME: ${OPENSHELL_INSTALL_PATH:-/tmp/openshell}
