services:
  multiclaw-vllm-server:
    image: "nvcr.io/nvidia/vllm:${VLLM_VERSION:-26.05.post1-py3}"
    container_name: multiclaw-vllm-server
    ipc: host
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_CACHE: /root/.cache/huggingface
    volumes:
      - "${HF_HUB_CACHE:-${HOME:-/tmp}/.cache/huggingface}:/root/.cache/huggingface"
    ports:
      - "${VLLM_PORT:-8020}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command:
      [
        "vllm",
        "serve",
        "${HF_MODEL_REPO:-openai}/${HF_MODEL_NAME:-gpt-oss-20b}",
        "--gpu-memory-utilization=${MAX_GPU_MEM_PERCENT:-0.6}",
      ]
    restart: unless-stopped

  multiclaw-nemoclaw:
    image: nemoclaw:latest
    container_name: multiclaw-nemoclaw
    build:
      context: .
    env_file:
      - path: .env
        required: false
    network_mode: host
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "${NEMOCLAW_DATA_DIR:-${HOME:-/tmp}/.nemoclaw}/data:/nemoclaw-data"
